<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo">🏕️</div>
    <h2>Регистрация</h2>

    @if (errorMessage) { <div class="error">{{ errorMessage }}</div> }
    @if (successMessage) { <div class="success">{{ successMessage }}</div> }

    <div class="form-group">
      <label>Логин</label>
      <input type="text" [(ngModel)]="username" placeholder="Придумайте логин" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" [(ngModel)]="password" placeholder="Минимум 6 символов" />
    </div>
    <div class="form-group">
      <label>Повторите пароль</label>
      <input type="password" [(ngModel)]="password2" placeholder="Ещё раз пароль" (keyup.enter)="onSubmit()" />
    </div>

    <button (click)="onSubmit()" class="btn-primary submit-btn" [disabled]="loading">
      @if (loading) { Создаём аккаунт... } @else { Зарегистрироваться }
    </button>

    <p class="auth-switch">
      Уже есть аккаунт? <a routerLink="/login">Войти</a>
    </p>
  </div>
</div>
