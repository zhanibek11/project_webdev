<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo">🏕️</div>
    <h2>Вход в Qazaq Rent</h2>

    @if (errorMessage) {
      <div class="error">{{ errorMessage }}</div>
    }

    <div class="form-group">
      <label>Логин</label>
      <input type="text" [(ngModel)]="username" placeholder="Ваш логин" (input)="clearError()" />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" (input)="clearError()" (keyup.enter)="onSubmit()" />
    </div>

    <button (click)="onSubmit()" class="btn-primary submit-btn" [disabled]="loading || !username || !password">
      @if (loading) { Входим... } @else { Войти }
    </button>

    <p class="auth-switch">
      Нет аккаунта? <a routerLink="/register">Зарегистрируйтесь</a>
    </p>
  </div>
</div>
