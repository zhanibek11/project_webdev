<div class="add-listing-page container">
  <h1>➕ Добавить юрту</h1>

  @if (errorMessage) { <div class="error">{{ errorMessage }}</div> }
  @if (successMessage) { <div class="success">{{ successMessage }}</div> }

  <div class="form-card card">

    <div class="form-group">
      <label>Название *</label>
      <input type="text" [(ngModel)]="title" placeholder="Например: Горная юрта у реки" />
    </div>

    <div class="form-group">
      <label>Описание *</label>
      <textarea [(ngModel)]="description" placeholder="Расскажите о вашем месте..." rows="5"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Город *</label>
        <select [(ngModel)]="selectedLocation">
          <option value="">Выберите город</option>
          @for (loc of locations; track loc.id) {
            <option [value]="loc.id">{{ loc.name }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Тип юрты *</label>
        <select [(ngModel)]="listingType">
          <option value="">Выберите тип</option>
          @for (t of typeOptions; track t.value) {
            <option [value]="t.value">{{ t.label }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Питание *</label>
        <select [(ngModel)]="mealPlan">
          <option value="">Выберите питание</option>
          @for (m of mealOptions; track m.value) {
            <option [value]="m.value">{{ m.label }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Цена за ночь (₸) *</label>
        <input type="number" [(ngModel)]="pricePerNight" placeholder="25000" min="1" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Макс. гостей *</label>
        <input type="number" [(ngModel)]="maxGuests" placeholder="4" min="1" max="50" />
      </div>

      <div class="form-group">
        <label>Ссылка на фото</label>
        <input type="url" [(ngModel)]="imageUrl" placeholder="https://..." />
      </div>
    </div>

    @if (imageUrl) {
      <div class="img-preview">
        <img [src]="imageUrl" alt="Предпросмотр" />
      </div>
    }

    <div class="form-actions">
      <button (click)="submit()" class="btn-primary" [disabled]="loading">
        @if (loading) { Добавляем... } @else { Добавить юрту }
      </button>
      <button (click)="reset()" class="btn-secondary">Очистить форму</button>
    </div>
  </div>
</div>
