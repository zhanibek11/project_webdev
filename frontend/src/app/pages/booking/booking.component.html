<div class="container booking-page">
  <button (click)="goBack()" class="btn-secondary back-btn">← Назад</button>
  <div class="booking-card card">
    <h2>📅 Оформление брони</h2>

    @if (errorMessage) { <div class="error">{{ errorMessage }}</div> }
    @if (successMessage) { <div class="success">{{ successMessage }}</div> }

    <div class="form-group">
      <label>Дата заезда</label>
      <input type="date" [(ngModel)]="checkIn" />
    </div>
    <div class="form-group">
      <label>Дата выезда</label>
      <input type="date" [(ngModel)]="checkOut" />
    </div>
    <div class="form-group">
      <label>Количество гостей</label>
      <input type="number" [(ngModel)]="guests" min="1" max="20" />
    </div>

    <button (click)="onSubmit()" class="btn-primary submit-btn" [disabled]="loading">
      @if (loading) { Бронируем... } @else { Подтвердить бронь }
    </button>
  </div>
</div>
